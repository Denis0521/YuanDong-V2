<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, interactive-widget=resizes-content">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>幼兒學習區紀錄</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="學習區紀錄">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
    :root {
        --primary-blue: #1a73e8;
        --bg-gray: #e8eaed;
        --border-color: #000;
    }

    * { box-sizing: border-box; }

    body { 
        background-color: var(--bg-gray); 
        font-family: "標楷體", BiauKai, "Microsoft JhengHei", sans-serif; 
        margin: 0; 
        padding: 0;
    }

    .container { max-width: 900px; margin: 20px auto; background: white; padding: 20px; border: 2px solid var(--border-color); }
    .control-panel { display: flex; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .btn { padding: 8px 15px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; font-weight: bold; }
    .btn-auth { background-color: var(--primary-blue); color: white; border: none; }
    .btn-load { background-color: #34a853; color: white; border: none; }
    .btn-save { background-color: #fbbc05; color: #000; border: none; }
    .btn-print { background-color: #17a2b8; color: white; border: none; }
    .btn-clear { background-color: #dc3545; color: white; border: none; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; }
    th, td { border: 1px solid var(--border-color); padding: 8px; text-align: left; vertical-align: top; }
    th { background-color: #f2f2f2; font-weight: bold; text-align: center; }
    
    input[type="text"], input[type="date"], textarea { width: 100%; border: 1px solid #ccc; padding: 6px; font-family: inherit; font-size: 16px; border-radius: 4px; }
    textarea { resize: vertical; min-height: 100px; }
    
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; padding: 5px; }
    .checkbox-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 16px; }
    
    .photo-grid { display: grid; grid-template-columns: repeat(2, 100px); gap: 10px; justify-content: center; }
    .photo-box { width: 100px; height: 100px; border: 1px solid #999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; background: #fafafa; position: relative; overflow: hidden; font-size: 12px; text-align: center; }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top:0; left:0; z-index: 2; }
    
    .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:none; justify-content:center; align-items:center; font-size:11px; color:#333; z-index: 5; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 10px; right: 10px; font-size: 20px; cursor: pointer; border: none; background: transparent; }
    .phrase-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; }
    .phrase-item:hover { background-color: #f0f4f9; }
    
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; font-size: 14px; }
    
    .btn-dict { margin-top: 5px; font-size: 13px; background: #f0f4f9; color: var(--primary-blue); border: 1px solid var(--primary-blue); padding: 3px 8px; border-radius: 4px; cursor: pointer; margin-right: 5px; }

    /* 行動裝置適配與網頁列印 RWD */
    @media (max-width: 600px) {
        .control-panel { flex-direction: column; align-items: stretch; }
        table, thead, tbody, th, td, tr { display: block; }
        th { text-align: left; background-color: #e8eaed; }
        td { width: 100% !important; }
        .photo-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media print {
        body { background: white; }
        .container { border: none; padding: 0; margin: 0; max-width: 100%; }
        .control-panel, .btn-dict, .no-print { display: none !important; }
        textarea { border: none; border-bottom: 1px dashed #ccc; background: transparent; overflow: hidden; height: auto; }
        input[type="text"], input[type="date"] { border: none; background: transparent; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <div>
            <button id="btnSignIn" class="btn btn-auth" onclick="handleAuthClick()">🔑 連接 Google 雲端</button>
            <button id="btnSignOut" class="btn btn-clear" style="display:none;" onclick="handleSignoutClick()">🚪 登出</button>
        </div>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <input type="text" id="ctrlClass" placeholder="班級" style="width: 70px;" value="大班">
            <input type="text" id="ctrlSeat" placeholder="座號" style="width: 50px;" value="01">
            <button class="btn btn-load" onclick="cloudLoad()">📥 載入雲端紀錄</button>
            <button class="btn btn-save" onclick="cloudSave()">💾 同步至雲端</button>
            <button class="btn btn-print" onclick="printToPDF()">🖨️ 列印/PDF</button>
            <button class="btn btn-clear" onclick="clearForm()">🧹 清空畫面</button>
        </div>
    </div>

    <h1 style="text-align: center; margin-top: 0;">幼兒學習區紀錄表</h1>
    
    <table>
        <tr>
            <th style="width: 15%;">班級</th>
            <td style="width: 18%;"><input type="text" id="className" value="大班"></td>
            <th style="width: 12%;">座號</th>
            <td style="width: 15%;"><input type="text" id="seatNumber" value="01"></td>
            <th style="width: 12%;">幼生姓名</th>
            <td style="width: 28%;"><input type="text" id="studentName" placeholder="請輸入姓名"></td>
        </tr>
        <tr>
            <th>紀錄日期</th>
            <td colspan="5">
                <input type="date" id="recordDate" style="width: 200px;">
            </td>
        </tr>
        <tr>
            <th>本週選擇<br>學習區</th>
            <td colspan="5">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="cb1"> 美勞區</label>
                    <label><input type="checkbox" id="cb2"> 語文區</label>
                    <label><input type="checkbox" id="cb3"> 益智區</label>
                    <label><input type="checkbox" id="cb4"> 積木區</label>
                    <label><input type="checkbox" id="cb5"> 扮演區</label>
                    <label><input type="checkbox" id="cb6"> 體能區</label>
                </div>
            </td>
        </tr>
        
        <tr>
            <th colspan="2">學習區觀察紀錄</th>
            <th colspan="2">幼生作品/活動照片 (最多4張)</th>
            <th colspan="2">照片說明 (選填)</th>
        </tr>
        
        <tr>
            <td colspan="2">
                <strong style="color:var(--primary-blue);">【觀察紀錄 A】</strong>
                <textarea id="area1" placeholder="請輸入美勞區或其他觀察內容..."></textarea>
                <button class="btn-dict no-print" onclick="openDictModal('area1','美勞區')">💡 美勞詞庫</button>
            </td>
            <td colspan="2" style="text-align: center; vertical-align: middle;">
                <div class="photo-grid">
                    <div class="photo-box" onclick="openPhotoSourceModal(1)">
                        <span>➕ 新增照片1</span>
                        <img id="preview1" alt="照片預覽1">
                        <div class="loading-overlay" id="loading1">壓縮中...</div>
                    </div>
                    <div class="photo-box" onclick="openPhotoSourceModal(2)">
                        <span>➕ 新增照片2</span>
                        <img id="preview2" alt="照片預覽2">
                        <div class="loading-overlay" id="loading2">壓縮中...</div>
                    </div>
                </div>
                <input type="file" id="file1" accept="image/*" style="display: none;">
                <input type="file" id="file2" accept="image/*" style="display: none;">
            </td>
            <td colspan="2">
                <textarea id="desc1" placeholder="請輸入相片1、2的補充說明..." style="min-height: 130px;"></textarea>
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <strong style="color:var(--primary-blue);">【觀察紀錄 B】</strong>
                <textarea id="area2" placeholder="請輸入語文/益智/積木區等觀察內容..."></textarea>
                <div class="no-print">
                    <button class="btn-dict" onclick="openDictModal('area2','語文區')">💡 語文詞庫</button>
                    <button class="btn-dict" onclick="openDictModal('area2','益智區')">💡 益智詞庫</button>
                    <button class="btn-dict" onclick="openDictModal('area2','積木區')">💡 積木詞庫</button>
                </div>
                <textarea id="area3" style="display:none;"></textarea>
                <textarea id="area4" style="display:none;"></textarea>
            </td>
            <td colspan="2" style="text-align: center; vertical-align: middle;">
                <div class="photo-grid">
                    <div class="photo-box" onclick="openPhotoSourceModal(3)">
                        <span>➕ 新增照片3</span>
                        <img id="preview3" alt="照片預覽3">
                        <div class="loading-overlay" id="loading3">壓縮中...</div>
                    </div>
                    <div class="photo-box" onclick="openPhotoSourceModal(4)">
                        <span>➕ 新增照片4</span>
                        <img id="preview4" alt="照片預覽4">
                        <div class="loading-overlay" id="loading4">壓縮中...</div>
                    </div>
                </div>
                <input type="file" id="file3" accept="image/*" style="display: none;">
                <input type="file" id="file4" accept="image/*" style="display: none;">
            </td>
            <td colspan="2">
                <textarea id="desc2" placeholder="請輸入相片3、4的補充說明..." style="min-height: 130px;"></textarea>
            </td>
        </tr>
    </table>
</div>

<div class="modal-overlay" id="dictModal" onclick="closeDictModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeDictModal()">✖</button>
        <h2 class="modal-title" style="display: flex; align-items: center; margin-top: 0;">
            <button id="btnBackToHome" onclick="backToDictHome()" style="margin-right: 15px; font-size: 15px; cursor: pointer; border: 1px solid #ccc; padding: 4px 10px; border-radius: 4px; background: #f0f0f0; display:none;">⬅ 返回</button>
            <span id="dictCategoryTitle">學習區</span>
        </h2>
        <p style="color: #ea4335; font-size: 14px; margin-bottom: 15px; font-weight: bold;">※ 點擊下方分類或句子，系統將自動填入並複製！</p>
        <div class="phrase-list" id="phraseListContainer"></div>
    </div>
</div>

<div class="modal-overlay" id="photoSourceModal" onclick="closePhotoSourceModal()">
    <div class="modal-content" onclick="event.stopPropagation()" style="text-align: center; max-width: 350px;">
        <button class="modal-close" onclick="closePhotoSourceModal()">✖</button>
        <h2 class="modal-title" style="text-align: center; margin-top: 0;">📸 選擇相片來源</h2>
        <p style="color: #555; margin-bottom: 20px;">請選擇您要上傳相片的方式：</p>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="btn btn-auth" style="background-color: #34a853;" onclick="selectPhotoSource('camera')">📷 開啟相機</button>
            <button class="btn btn-load" style="background-color: #fbbc05; color: black;" onclick="selectPhotoSource('gallery')">📁 本地相簿</button>
        </div>
    </div>
</div>

<div class="toast" id="copyToast">📋 已複製內容至剪貼簿與文字框！</div>

<script src="app.js"></script>
</body>
</html>
